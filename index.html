<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ElectroVerse-AI</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}


body{
    background:white;
}


/* Top Cover Section */

.header{

    background:#87CEEB;
    height:45vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:#00334d;

}


.header h1{

    font-size:55px;
    letter-spacing:4px;
    font-weight:bold;

}


/* Main Section */

.container{

    text-align:center;
    padding:50px 20px;

}


.tagline{

    font-size:22px;
    color:#333;
    line-height:1.8;

}


.welcome{

    margin-top:40px;
    font-size:35px;
    color:#00334d;

}


.message{

    margin-top:20px;
    font-size:18px;
    color:#555;

}


/* Button */

.explore-btn{

    margin-top:35px;
    padding:15px 45px;
    font-size:20px;
    border:none;
    border-radius:30px;
    background:#00a8e8;
    color:white;
    cursor:pointer;
    font-weight:bold;

}


.explore-btn:hover{

    background:#00334d;
    transform:scale(1.05);

}


</style>

</head>


<body>


<!-- Light Blue Cover -->

<section class="header">

<div>

<h1>ELECTROVERSE-AI</h1>

</div>

</section>



<!-- White Content Section -->

<section class="container">


<p class="tagline">

AI + ELECTRONICS + IoT INNOVATION<br>

PCB DESIGN + CIRCUIT SIMULATION AND DESIGN

</p>



<h2 class="welcome">

🚀 WELCOME TO ELECTROVERSE AI

</h2>



<p class="message">

Explore the world of intelligent electronics,
<br>
smart circuits, IoT solutions and innovative engineering designs.

</p>

<a href="dashboard.html">
  <button class="explore-btn">
    Explore-It ⚡
  </button>
</a>

</section>



</body>

</html>
